name: Build AVR Toolchain (aarch64-android)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils xz-utils zstd wget file

      - name: Download Termux AVR packages (aarch64)
        run: |
          set -e
          mkdir -p downloads
          cd downloads

          POOL_URL="https://packages.termux.dev/apt/termux-main/pool/main/a"

          echo "Fetching pool directory listing..."
          curl -fsSL "$POOL_URL/" -o pool_index.html

          # Extract .deb filenames for the packages we need, picking the
          # aarch64 build of each. Termux filenames look like:
          #   avr-gcc_<version>_aarch64.deb
          #   avr-binutils_<version>_aarch64.deb
          #   avrdude_<version>_aarch64.deb
          for pkg in avr-gcc avr-binutils avrdude; do
            echo "Looking for package: $pkg"
            fname=$(grep -oE "href=\"${pkg}_[^\"]*_aarch64\.deb\"" pool_index.html \
                      | sed -E 's/href="(.*)"/\1/' \
                      | sort -V | tail -n1)

            if [ -z "$fname" ]; then
              echo "ERROR: could not find a .deb for $pkg in pool listing"
              echo "---- pool_index.html snippet (grep $pkg) ----"
              grep -i "$pkg" pool_index.html || echo "(no matches at all for $pkg)"
              exit 1
            fi

            echo "Found: $fname"
            curl -fsSL "$POOL_URL/$fname" -o "$fname"
          done

          ls -la

      - name: Extract binaries from .deb packages
        run: |
          set -e
          mkdir -p extracted/bin extracted/lib extracted/etc
          cd downloads

          for deb in *.deb; do
            echo "=== Extracting $deb ==="
            workdir="work_$(basename "$deb" .deb)"
            mkdir -p "$workdir"
            ar x "$deb" --output="$workdir" 2>/dev/null || (cd "$workdir" && ar x "../$deb")

            cd "$workdir"
            data_archive=$(ls data.tar.* 2>/dev/null | head -n1)

            if [ -z "$data_archive" ]; then
              echo "ERROR: no data.tar.* found in $deb"
              ls -la
              exit 1
            fi

            echo "Data archive: $data_archive"
            case "$data_archive" in
              *.tar.xz)  tar -xJf "$data_archive" ;;
              *.tar.gz)  tar -xzf "$data_archive" ;;
              *.tar.zst) tar --use-compress-program=unzstd -xf "$data_archive" ;;
              *) echo "Unknown archive format: $data_archive"; exit 1 ;;
            esac

            # Termux installs under data/data/com.termux/files/usr/
            TERMUX_PREFIX="data/data/com.termux/files/usr"

            if [ -d "$TERMUX_PREFIX/bin" ]; then
              find "$TERMUX_PREFIX/bin" -maxdepth 1 -type f -exec cp -v {} ../../extracted/bin/ \;
            fi
            if [ -d "$TERMUX_PREFIX/lib" ]; then
              find "$TERMUX_PREFIX/lib" -maxdepth 1 -type f \( -name '*.so' -o -name '*.so.*' \) -exec cp -v {} ../../extracted/lib/ \;
            fi
            if [ -d "$TERMUX_PREFIX/etc" ]; then
              find "$TERMUX_PREFIX/etc" -maxdepth 1 -type f -name 'avrdude.conf' -exec cp -v {} ../../extracted/etc/ \;
            fi

            cd ../..
          done

          echo "=== Extracted bin contents ==="
          ls -la extracted/bin
          echo "=== Extracted lib contents ==="
          ls -la extracted/lib || true
          echo "=== Extracted etc contents ==="
          ls -la extracted/etc || true

      - name: Verify binaries are aarch64
        run: |
          set -e
          cd extracted/bin
          if [ -z "$(ls -A .)" ]; then
            echo "ERROR: extracted/bin is empty"
            exit 1
          fi
          for f in *; do
            echo "--- $f ---"
            file "$f"
          done

      - name: Write manifest.json
        run: |
          cat > extracted/manifest.json <<EOF
          {
            "name": "avr-toolchain",
            "arch": "aarch64",
            "platform": "android",
            "version": "${{ github.event.inputs.release_version }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "source": "termux"
          }
          EOF
          cat extracted/manifest.json

      - name: Package as tar.gz
        run: |
          set -e
          VERSION="${{ github.event.inputs.release_version }}"
          ASSET_NAME="avr-toolchain-aarch64-${VERSION}.tar.gz"
          cd extracted
          chmod +x bin/* || true
          tar -czf "../${ASSET_NAME}" .
          cd ..
          ls -la "${ASSET_NAME}"
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: "AVR Toolchain ${{ github.event.inputs.release_version }} (aarch64-android)"
          files: ${{ env.ASSET_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
