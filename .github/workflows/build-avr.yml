name: Build AVR Toolchain

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            curl \
            xz-utils \
            bzip2 \
            unzip \
            tar \
            file

      - name: Create Workspace
        run: |
          mkdir -p work/src

      - name: Download Sources
        run: |
          cd work/src

          wget https://ftp.gnu.org/gnu/binutils/binutils-2.40.tar.xz

          wget https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz

          wget https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2

      - name: Verify Downloads
        run: |
          echo "Downloaded files:"
          ls -lh work/src

      - name: Extract Sources
        run: |
          cd work/src

          tar -xf binutils-2.40.tar.xz
          tar -xf gcc-12.2.0.tar.xz
          tar -xf avr-libc-2.1.0.tar.bz2

      - name: Verify Extraction
        run: |
          echo "Source folders:"
          find work/src -maxdepth 1 -type d

      - name: Download Android NDK
        run: |
          cd work

          wget https://dl.google.com/android/repository/android-ndk-r27c-linux.zip

          unzip -q android-ndk-r27c-linux.zip

      - name: Verify Android NDK
        run: |
          echo "NDK contents:"
          ls -lh work

          echo ""
          echo "LLVM toolchain binaries:"
          ls work/android-ndk-r27c/toolchains/llvm/prebuilt/linux-x86_64/bin | head

      - name: Configure Android Toolchain
        run: |
          export NDK=$PWD/work/android-ndk-r27c

          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export PATH=$TOOLCHAIN/bin:$PATH

          echo "NDK=$NDK"
          echo "TOOLCHAIN=$TOOLCHAIN"

          echo ""
          echo "Host Clang:"
          clang --version

          echo ""
          echo "Android Clang:"
          aarch64-linux-android21-clang --version

      - name: Create Test Program
        run: |
          cat > hello.c << 'EOF'
          #include <stdio.h>

          int main()
          {
              printf("Hello from Android NDK\n");
              return 0;
          }
          EOF

      - name: Compile Test Program
        run: |
          export NDK=$PWD/work/android-ndk-r27c

          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export PATH=$TOOLCHAIN/bin:$PATH

          aarch64-linux-android21-clang hello.c -o hello

      - name: Verify Test Binary
        run: |
          file hello

      - name: Upload Source Bundle
        uses: actions/upload-artifact@v4
        with:
          name: avr-sources
          path: work/src/
