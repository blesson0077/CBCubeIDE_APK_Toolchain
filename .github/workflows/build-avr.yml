name: Build AVR Toolchain

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            wget \
            curl \
            xz-utils \
            bzip2 \
            unzip \
            tar \
            file \
            build-essential \
            flex \
            bison \
            texinfo \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev

      - name: Create Workspace
        run: |
          mkdir -p work/src
          mkdir -p work/build

      - name: Download Sources
        run: |
          cd work/src

          wget -nc https://ftp.gnu.org/gnu/binutils/binutils-2.40.tar.xz
          wget -nc https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz
          wget -nc https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2

      - name: Extract Sources
        run: |
          cd work/src

          [ -d binutils-2.40 ] || tar -xf binutils-2.40.tar.xz
          [ -d gcc-12.2.0 ] || tar -xf gcc-12.2.0.tar.xz
          [ -d avr-libc-2.1.0 ] || tar -xf avr-libc-2.1.0.tar.bz2

      - name: Download GCC Prerequisites
        run: |
          cd work/src/gcc-12.2.0

          chmod +x contrib/download_prerequisites

          ./contrib/download_prerequisites

          echo "Downloaded GCC prerequisites:"
          ls -lh

      - name: Download Android NDK
        run: |
          cd work

          wget -nc https://dl.google.com/android/repository/android-ndk-r27c-linux.zip

          if [ ! -d android-ndk-r27c ]; then
            unzip -q android-ndk-r27c-linux.zip
          fi

      - name: Configure Android Toolchain
        run: |
          export NDK=$PWD/work/android-ndk-r27c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          echo "Android Clang:"
          aarch64-linux-android21-clang --version

      - name: Create Binutils Build Directory
        run: |
          mkdir -p work/build/binutils

      - name: Configure AVR Binutils
        run: |
          export NDK=$PWD/work/android-ndk-r27c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++

          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          cd work/build/binutils

          ../../src/binutils-2.40/configure \
            --target=avr \
            --host=aarch64-unknown-linux-android \
            --build=x86_64-linux-gnu \
            --prefix=$PWD/install \
            --disable-nls \
            --disable-werror

      - name: Build AVR Binutils
        run: |
          export NDK=$PWD/work/android-ndk-r27c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++

          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          echo "Compiler location:"
          which aarch64-linux-android21-clang

          echo ""
          echo "Compiler version:"
          aarch64-linux-android21-clang --version

          echo ""
          echo "AR location:"
          which llvm-ar

          echo "RANLIB location:"
          which llvm-ranlib

          echo "STRIP location:"
          which llvm-strip

          cd work/build/binutils

          make -j$(nproc) all-binutils

      - name: Verify AVR Tools
        run: |
          echo "Searching for generated binaries..."

          find work/build/binutils -type f | grep "as-new" || true
          find work/build/binutils -type f | grep "ld-new" || true
          find work/build/binutils -type f | grep "objdump" || true
          find work/build/binutils -type f | grep "objcopy" || true
          find work/build/binutils -type f | grep "/ar$" || true

      - name: Install AVR Binutils
        run: |
          export NDK=$PWD/work/android-ndk-r27c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++

          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          cd work/build/binutils

          make install-binutils
          make install-gas

      - name: Verify Installed AVR Tools
        run: |
          echo "Installed AVR files:"
          find work/build/binutils/install -type f | sort

          echo ""
          echo "Installed AVR bin directory:"
          ls -lh work/build/binutils/install/bin || true

          echo ""
          echo "Searching for AVR executables:"
          find work/build/binutils/install -name "*avr*" || true

      - name: Configure AVR GCC
        run: |
          export NDK=$PWD/work/android-ndk-r27c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          # Native compiler for building GCC itself
          export CC=gcc
          export CXX=g++
          export AR=ar
          export RANLIB=ranlib
          export STRIP=strip

          export CXXFLAGS="-g -O2"
          export CFLAGS="-g -O2"

          rm -rf work/build/gcc
          mkdir -p work/build/gcc

          BINUTILS_INSTALL=$PWD/work/build/binutils/install

          CONFIGURE_FLAGS="\
          --target=avr \
          --host=aarch64-unknown-linux-android \
          --build=x86_64-linux-gnu \
          --prefix=$BINUTILS_INSTALL \
          --enable-languages=c \
          --without-headers \
          --disable-nls \
          --disable-shared \
          --disable-threads \
          --disable-libssp \
          --disable-libada \
          --disable-libquadmath \
          --disable-libgomp \
          --disable-lto \
          --disable-plugin \
          --without-isl \
          --disable-libcody"

          cd work/build/gcc

          echo "=== Configure flags ==="
          echo $CONFIGURE_FLAGS

          if ../../src/gcc-12.2.0/configure $CONFIGURE_FLAGS; then
            echo "=== Configure SUCCEEDED ==="
          else
            echo "=== Configure FAILED ==="
            tail -200 config.log || true
            tail -100 gcc/config.log 2>/dev/null || true
            exit 1
          fi

            
      - name: Build AVR GCC
        run: |
          export CC=gcc
          export CXX=g++
          export AR=ar
          export RANLIB=ranlib
          export STRIP=strip

          cd work/build/gcc

          echo "=== Host Compiler ==="
          which g++
          g++ --version

          echo ""
          echo "=== PATH ==="
          echo $PATH

          echo ""
          echo "=== Checking xgcc ==="
          ls -lh gcc/xgcc || true

          echo ""
          echo "=== GCC executables ==="
          find gcc -type f -executable | sort || true

          echo ""
          echo "=== Adding gcc directory to PATH ==="
          export PATH=$PWD/gcc:$PATH

          echo ""
          echo "=== PATH AFTER UPDATE ==="
          echo $PATH

          echo ""
          echo "=== Starting GCC Build (Verbose) ==="

          make -j$(nproc) all-gcc V=1
      

      - name: Dump GCC Logs On Failure
        if: failure()
        run: |
          echo "=== ERROR SEARCH ==="
          grep -R -n -i "error:" work/build/gcc | head -300 || true

          echo ""
          echo "=== FATAL SEARCH ==="
          grep -R -n -i "fatal" work/build/gcc | head -300 || true

          echo ""
          echo "=== SPECS SEARCH ==="
          grep -R -n "dumpspecs" work/build/gcc | head -100 || true

          echo ""
          echo "=== xgcc SEARCH ==="
          find work/build/gcc -name xgcc || true

          echo ""
          echo "=== avr-gcc SEARCH ==="
          find work/build/gcc -name avr-gcc || true

          echo ""
          echo "=== LAST 200 LINES OF BUILD LOGS ==="
          find work/build/gcc -name "*.log" -exec tail -200 {} \; 2>/dev/null || true
          
      - name: Verify GCC Build
        run: |
          echo "=== Searching for xgcc ==="
          find work/build/gcc -name "xgcc" || true

          echo ""
          echo "=== Searching for cc1 ==="
          find work/build/gcc -name "cc1" || true

          echo ""
          echo "=== Searching for cc1plus (should NOT exist) ==="
          find work/build/gcc -name "cc1plus" || true

          echo ""
          echo "=== All GCC build executables ==="
          find work/build/gcc/gcc -type f -executable 2>/dev/null | sort || true

      - name: Install AVR GCC
        run: |
          export CC=gcc
          export CXX=g++
          export AR=ar
          export RANLIB=ranlib
          export STRIP=strip

          cd work/build/gcc

          make install-gcc
          
      - name: Verify AVR GCC Installed
        run: |
          BINUTILS_INSTALL=$PWD/work/build/binutils/install

          echo "=== AVR bin directory ==="
          ls -lh $BINUTILS_INSTALL/bin/ || true

          echo ""
          echo "=== Searching for avr-gcc ==="
          find $BINUTILS_INSTALL -name "avr-gcc*" || true

          echo ""
          echo "=== avr-gcc file type ==="
          file $BINUTILS_INSTALL/bin/avr-gcc || true

      - name: Upload AVR Binutils Package
        uses: actions/upload-artifact@v4
        with:
          name: avr-binutils-install
          path: work/build/binutils/install

      - name: Upload Binutils Build
        uses: actions/upload-artifact@v4
        with:
          name: avr-binutils-build
          path: work/build/binutils

      - name: Upload AVR GCC Build
        uses: actions/upload-artifact@v4
        with:
          name: avr-gcc-build
          path: work/build/gcc

      - name: Upload Full Toolchain Install
        uses: actions/upload-artifact@v4
        with:
          name: avr-toolchain-android-aarch64
          path: work/build/binutils/install
