name: Build AVR Toolchain (aarch64-android NDK)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r26d
      API_LEVEL: 24
      TARGET_TRIPLE: aarch64-linux-android
      TARGET_TRIPLE_API: aarch64-linux-android24
      INSTALL_DIR: ${{ github.workspace }}/avr-toolchain-out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential wget curl xz-utils \
            texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev \
            zlib1g-dev libusb-dev libftdi-dev cmake ninja-build \
            python3 file

      - name: Download Android NDK ${{ env.NDK_VERSION }}
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          unzip -q "android-ndk-${NDK_VERSION}-linux.zip"
          echo "NDK_HOME=${{ github.workspace }}/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Set up NDK toolchain variables
        run: |
          NDK="${{ github.workspace }}/android-ndk-${NDK_VERSION}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          echo "CC=$TOOLCHAIN/bin/${{ env.TARGET_TRIPLE_API }}-clang"       >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${{ env.TARGET_TRIPLE_API }}-clang++"    >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar"                                   >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib"                           >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip"                             >> $GITHUB_ENV
          echo "NM=$TOOLCHAIN/bin/llvm-nm"                                   >> $GITHUB_ENV
          echo "TOOLCHAIN_BIN=$TOOLCHAIN/bin"                                >> $GITHUB_ENV
          mkdir -p "${{ env.INSTALL_DIR }}/bin" "${{ env.INSTALL_DIR }}/lib" "${{ env.INSTALL_DIR }}/etc"

      - name: Build binutils 2.42 (AVR, cross to aarch64-android)
        run: |
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.xz"
          tar -xJf binutils-2.42.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.42/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=${{ env.TARGET_TRIPLE }} \
            --build=x86_64-linux-gnu \
            --disable-nls \
            --disable-werror \
            --disable-shared \
            --enable-static \
            CC="${{ env.CC }}" \
            CXX="${{ env.CXX }}" \
            AR="${{ env.AR }}" \
            RANLIB="${{ env.RANLIB }}" \
            NM="${{ env.NM }}" \
            STRIP="${{ env.STRIP }}" \
            CFLAGS="-Os" \
            CXXFLAGS="-Os"
          make -j$(nproc)
          make install
          echo "=== binutils done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      - name: Build GCC 13.2.0 (AVR, cross to aarch64-android) — stage 1 (C only)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz"
          tar -xJf gcc-13.2.0.tar.xz
          cd gcc-13.2.0
          contrib/download_prerequisites
          cd ..
          mkdir build-gcc && cd build-gcc
          export PATH="${{ env.INSTALL_DIR }}/bin:$PATH"
          # NDK's lld rejects misaligned relocations in gcov.o (known GCC 13 + lld bug).
          # --disable-gcov removes that tool entirely — we don't need it for AVR work.
          # LDFLAGS forces lld; suppress clang unused-arg warnings that become errors.
          export LDFLAGS="-fuse-ld=lld"
          export CFLAGS="-Os -Wno-unused-command-line-argument"
          export CXXFLAGS="-Os -Wno-unused-command-line-argument"
          ../gcc-13.2.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=${{ env.TARGET_TRIPLE }} \
            --build=x86_64-linux-gnu \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-shared \
            --enable-static \
            --with-dwarf2 \
            --disable-install-libiberty \
            --disable-gcov \
            --with-gnu-as \
            --with-gnu-ld \
            CC="${{ env.CC }}" \
            CXX="${{ env.CXX }}" \
            AR="${{ env.AR }}" \
            RANLIB="${{ env.RANLIB }}" \
            NM="${{ env.NM }}" \
            STRIP="${{ env.STRIP }}" \
            CFLAGS_FOR_TARGET="-Os"
          make -j$(nproc) all-gcc
          make install-gcc
          echo "=== gcc done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      - name: Build avr-libc 2.1.0
        run: |
          wget -q "https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2"
          tar -xjf avr-libc-2.1.0.tar.bz2
          mkdir build-avr-libc && cd build-avr-libc
          export PATH="${{ env.INSTALL_DIR }}/bin:$PATH"
          ../avr-libc-2.1.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --host=avr \
            --build=x86_64-linux-gnu
          make -j$(nproc)
          make install
          echo "=== avr-libc done ==="

      - name: Build avrdude 7.3 (cross to aarch64-android)
        run: |
          wget -q "https://github.com/avrdudes/avrdude/releases/download/v7.3/avrdude-7.3.tar.gz"
          tar -xzf avrdude-7.3.tar.gz
          mkdir build-avrdude && cd build-avrdude
          cmake ../avrdude-7.3 \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" \
            -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_API=${{ env.API_LEVEL }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DHAVE_LIBUSB=OFF \
            -DHAVE_LIBFTDI=OFF \
            -DHAVE_LIBHIDAPI=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make -j$(nproc)
          make install
          echo "=== avrdude done ==="

      - name: Strip binaries
        run: |
          export PATH="${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            if file "$f" | grep -q "ELF.*aarch64"; then
              echo "Stripping $f"
              llvm-strip "$f" || true
            fi
          done

      - name: Verify all binaries are aarch64
        run: |
          echo "=== Architecture verification ==="
          BAD=0
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            info=$(file "$f")
            echo "$f: $info"
            if echo "$info" | grep -q "ELF" && ! echo "$info" | grep -q "aarch64"; then
              echo "❌ WRONG ARCH: $f"
              BAD=1
            fi
          done
          if [ "$BAD" = "1" ]; then
            echo "ERROR: Some binaries are not aarch64. Aborting."
            exit 1
          fi
          echo "✅ All ELF binaries are aarch64"

      - name: Write manifest.json
        run: |
          cat > "${{ env.INSTALL_DIR }}/manifest.json" <<EOF
          {
            "name": "avr-toolchain",
            "arch": "aarch64",
            "abi": "aarch64-linux-android",
            "api_level": ${{ env.API_LEVEL }},
            "version": "${{ github.event.inputs.release_version }}",
            "components": {
              "binutils": "2.42",
              "gcc": "13.2.0",
              "avr-libc": "2.1.0",
              "avrdude": "7.3"
            },
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat "${{ env.INSTALL_DIR }}/manifest.json"

      - name: Package as zip
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          ASSET_NAME="avr-toolchain-android-aarch64.zip"
          cd "${{ env.INSTALL_DIR }}"
          zip -r "${{ github.workspace }}/${ASSET_NAME}" .
          ls -lh "${{ github.workspace }}/${ASSET_NAME}"
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Delete existing release if it exists
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$VERSION" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: "AVR Toolchain ${{ github.event.inputs.release_version }} (aarch64-android)"
          body: |
            ## AVR Toolchain for Android AArch64

            Built with Android NDK ${{ env.NDK_VERSION }}, API level ${{ env.API_LEVEL }}.

            ### Components
            - binutils 2.42 (avr-as, avr-ld, avr-ar, avr-objcopy, avr-objdump, avr-size)
            - GCC 13.2.0 (avr-gcc, avr-g++)
            - avr-libc 2.1.0
            - avrdude 7.3

            ### Architecture
            - Target host: `aarch64-linux-android` (Android ARM64)
            - Compiles for: AVR (ATmega328P, ATmega2560, etc.)
          files: ${{ env.ASSET_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
