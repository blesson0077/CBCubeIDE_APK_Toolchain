name: Build AVR Toolchain (aarch64-android NDK)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.12)'
        required: true
        default: 'v1.0.15'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NDK_VER:     r26d
      API_LEVEL:   24
      INSTALL_DIR: ${{ github.workspace }}/avr-toolchain-out
      DEPS_DIR:    ${{ github.workspace }}/ndk-static-deps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential wget xz-utils texinfo bison flex \
            cmake ninja-build python3 file zip \
            binutils-aarch64-linux-gnu \
            gcc-avr

      - name: Download and configure Android NDK r26d
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
          unzip -q "android-ndk-${NDK_VER}-linux.zip"

          NDK="${{ github.workspace }}/android-ndk-${NDK_VER}"
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          ln -sf /usr/bin/aarch64-linux-gnu-ld "$TC/bin/ld.bfd"
          echo "ld.bfd -> $(readlink -f $TC/bin/ld.bfd)"

          echo "CC=$TC/bin/aarch64-linux-android${API_LEVEL}-clang"    >> $GITHUB_ENV
          echo "CXX=$TC/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TC/bin/llvm-ar"                                     >> $GITHUB_ENV
          echo "RANLIB=$TC/bin/llvm-ranlib"                             >> $GITHUB_ENV
          echo "NM=$TC/bin/llvm-nm"                                     >> $GITHUB_ENV
          echo "STRIP=$TC/bin/llvm-strip"                               >> $GITHUB_ENV
          echo "NDK_TC=$TC"                                             >> $GITHUB_ENV
          echo "LDFLAGS=-fuse-ld=bfd -static"                          >> $GITHUB_ENV
          echo "CFLAGS=-Os"                                             >> $GITHUB_ENV
          echo "CXXFLAGS=-Os"                                           >> $GITHUB_ENV

          mkdir -p "${{ env.INSTALL_DIR }}/bin" \
                   "${{ env.INSTALL_DIR }}/etc" \
                   "${{ env.DEPS_DIR }}"

      - name: Build GMP 6.3.0 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz"
          tar -xJf gmp-6.3.0.tar.xz
          sed -i 's|nl_langinfo (RADIXCHAR)|"."|g' gmp-6.3.0/gmp-impl.h
          mkdir build-gmp && cd build-gmp
          ../gmp-6.3.0/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build MPFR 4.2.1 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.1.tar.xz"
          tar -xJf mpfr-4.2.1.tar.xz
          mkdir build-mpfr && cd build-mpfr
          ../mpfr-4.2.1/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            --with-gmp="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build MPC 1.3.1 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
          tar -xzf mpc-1.3.1.tar.gz
          mkdir build-mpc && cd build-mpc
          ../mpc-1.3.1/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            --with-gmp="${{ env.DEPS_DIR }}" \
            --with-mpfr="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build binutils 2.42 (target=avr, host=aarch64-android)
        run: |
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.xz"
          tar -xJf binutils-2.42.tar.xz

          cat > /tmp/patch_pex.py << 'PYEOF'
          import pathlib
          p = pathlib.Path("binutils-2.42/libiberty/pex-unix.c")
          src = p.read_text()
          header = "/* Android bionic patch */\n#include <spawn.h>\n#ifdef HAVE_POSIX_SPAWN\n#undef HAVE_POSIX_SPAWN\n#endif\n"
          if "Android bionic patch" not in src:
              src = header + src
              p.write_text(src)
              print("PATCH APPLIED")
          else:
              print("Already patched")
          print("First 6 lines:")
          print('\n'.join(src.splitlines()[:6]))
          PYEOF

          python3 /tmp/patch_pex.py

          echo "=== pex-unix.c first 6 lines ==="
          head -6 "binutils-2.42/libiberty/pex-unix.c"

          mkdir build-binutils && cd build-binutils

          unset LDFLAGS
          unset CFLAGS
          unset CXXFLAGS

          ../binutils-2.42/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --disable-nls \
            --disable-werror \
            --disable-shared \
            --enable-static \
            CFLAGS="-Os -Wno-implicit-function-declaration" \
            LDFLAGS="-static"

          make -j$(nproc) || { echo "❌ binutils make FAILED"; exit 1; }
          make install    || { echo "❌ binutils make install FAILED"; exit 1; }

          ls -lh "${{ env.INSTALL_DIR }}/bin/"

          for b in avr-as avr-ld avr-ar avr-ranlib avr-objcopy avr-objdump avr-nm avr-size; do
            [ -f "${{ env.INSTALL_DIR }}/bin/$b" ] \
              && echo "✅ $b" \
              || { echo "❌ MISSING: $b"; exit 1; }
          done
          echo "=== binutils all good ==="

      - name: Build GCC 12.2.0 (target=avr, host=aarch64-android)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz"
          tar -xJf gcc-12.2.0.tar.xz

          find gcc-12.2.0 -name "system.h" | xargs sed -i \
            -e '/fputc_unlocked/d'   \
            -e '/fputs_unlocked/d'   \
            -e '/fwrite_unlocked/d'  \
            -e '/getc_unlocked/d'    \
            -e '/getchar_unlocked/d' \
            -e '/putc_unlocked/d'    \
            -e '/putchar_unlocked/d'

          echo "Patched system.h files:"
          find gcc-12.2.0 -name "system.h" | xargs grep -l "unlocked" 2>/dev/null \
            && echo "WARNING: some unlocked refs remain" || echo "All clean"

          cat > /tmp/patch_gcc_pex.py << 'PYEOF'
          import pathlib, glob
          header = "/* Android bionic patch */\n#include <spawn.h>\n#ifdef HAVE_POSIX_SPAWN\n#undef HAVE_POSIX_SPAWN\n#endif\n"
          for path_str in glob.glob("gcc-12.2.0/**/pex-unix.c", recursive=True):
              p = pathlib.Path(path_str)
              src = p.read_text()
              if "Android bionic patch" not in src:
                  src = header + src
                  p.write_text(src)
                  print("PATCHED: " + path_str)
              else:
                  print("Already patched: " + path_str)
          PYEOF

          python3 /tmp/patch_gcc_pex.py

          mkdir build-gcc && cd build-gcc
          export PATH="${{ env.INSTALL_DIR }}/bin:$PATH"

          ../gcc-12.2.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-shared \
            --enable-static \
            --with-dwarf2 \
            --disable-install-libiberty \
            --disable-gcov \
            --disable-lto \
            --disable-plugin \
            --without-zstd \
            --with-gnu-as \
            --with-gnu-ld \
            --with-gmp="${{ env.DEPS_DIR }}" \
            --with-mpfr="${{ env.DEPS_DIR }}" \
            --with-mpc="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os -Wno-implicit-function-declaration" \
            CXXFLAGS="-Os" \
            CFLAGS_FOR_TARGET="-Os"

          make -j$(nproc) all-gcc  || { echo "❌ GCC make FAILED"; exit 1; }
          make install-gcc          || { echo "❌ GCC install FAILED"; exit 1; }

          echo "=== GCC done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      - name: Build avr-libc 2.1.0
        run: |
          wget -q "https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2"
          tar -xjf avr-libc-2.1.0.tar.bz2
          mkdir build-avr-libc && cd build-avr-libc
          ../avr-libc-2.1.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --host=avr \
            --build=x86_64-linux-gnu \
            CC=/usr/bin/avr-gcc \
            AR=/usr/bin/avr-ar \
            RANLIB=/usr/bin/avr-ranlib \
            STRIP=/usr/bin/avr-strip
          make -j$(nproc) && make install
          echo "=== avr-libc done ==="

      - name: Build avrdude 7.3 (host=aarch64-android)
        run: |
          wget -v "https://github.com/avrdudes/avrdude/archive/refs/tags/v7.3.tar.gz" \
               -O avrdude-7.3.tar.gz
          tar -xzf avrdude-7.3.tar.gz
          AVRDUDE_SRC=$(ls -d avrdude-*/ | head -1)
          echo "Source: $AVRDUDE_SRC"
          mkdir build-avrdude && cd build-avrdude
          cmake "../$AVRDUDE_SRC" \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" \
            -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=${{ env.API_LEVEL }} \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="${{ github.workspace }}/android-ndk-${{ env.NDK_VER }}" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=bfd -static" \
            -DUSE_LIBUSB_1_0=OFF \
            -DUSE_LIBFTDI1=OFF \
            -DUSE_LIBHIDAPI=OFF \
            -DUSE_LIBELF=OFF \
            -DUSE_LINUXGPIO=OFF \
            -DUSE_LINUXSPI=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make -j$(nproc) && make install
          find . -name "avrdude.conf" \
            -exec cp -v {} "${{ env.INSTALL_DIR }}/etc/" \; 2>/dev/null || true
          echo "=== avrdude done ==="

      - name: Create bin/ld from avr-ld
        run: |
          BIN="${{ env.INSTALL_DIR }}/bin"
          if [ ! -f "$BIN/avr-ld" ]; then
            echo "❌ avr-ld missing from $BIN — binutils step must have failed"
            exit 1
          fi
          cp "$BIN/avr-ld" "$BIN/ld"
          echo "✅ bin/ld created (copy of avr-ld)"
          ls -lh "$BIN/avr-ld" "$BIN/ld"

      - name: Strip and verify binaries
        run: |
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            if file "$f" | grep -q "ELF.*aarch64"; then
              "${{ env.STRIP }}" "$f" 2>/dev/null && echo "stripped: $(basename $f)" || true
            fi
          done
          echo "=== verify ==="
          BAD=0
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            info=$(file "$f")
            echo "  $(basename $f): $info"
            if echo "$info" | grep -q "ELF" && ! echo "$info" | grep -q "aarch64"; then
              echo "❌ WRONG ARCH: $f"; BAD=1
            fi
          done
          [ "$BAD" = "0" ] || { echo "Wrong arch found"; exit 1; }
          echo "✅ All aarch64"

      - name: Verify all required binaries are present
        run: |
          REQUIRED=(
            avr-gcc
            avr-g++
            avr-as
            avr-ld
            avr-ar
            avr-objcopy
            avr-objdump
            avr-nm
            avr-ranlib
            avr-size
            ld
            cc1
            collect2
          )
          MISSING=0
          echo "=== Binary completeness check ==="
          for bin in "${REQUIRED[@]}"; do
            found=$(find "${{ env.INSTALL_DIR }}/bin" \
                         "${{ env.INSTALL_DIR }}/libexec" \
                    -name "$bin" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "  ✅ $bin  →  $found"
            else
              echo "  ❌ MISSING: $bin"
              MISSING=1
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "One or more required binaries are missing."
            exit 1
          fi
          echo ""
          echo "✅ All required binaries present — safe to package."

      - name: Write manifest.json
        run: |
          cat > "${{ env.INSTALL_DIR }}/manifest.json" << EOF
          {
            "name": "avr-toolchain",
            "arch": "aarch64",
            "abi": "aarch64-linux-android",
            "api_level": ${{ env.API_LEVEL }},
            "version": "${{ github.event.inputs.release_version }}",
            "components": {
              "binutils": "2.42",
              "gcc": "12.2.0",
              "avr-libc": "2.1.0",
              "avrdude": "7.3"
            },
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Package as zip
        run: |
          ASSET="avr-toolchain-android-aarch64.zip"
          cd "${{ env.INSTALL_DIR }}"
          zip -r "${{ github.workspace }}/$ASSET" .
          ls -lh "${{ github.workspace }}/$ASSET"
          echo "ASSET_NAME=$ASSET" >> $GITHUB_ENV

      - name: Delete existing release
        run: gh release delete "${{ github.event.inputs.release_version }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: "AVR Toolchain ${{ github.event.inputs.release_version }} (aarch64-android)"
          body: |
            ## AVR Toolchain for Android AArch64

            Built with Android NDK r26d (API 24). Statically linked against bionic.

            ### Components
            - binutils 2.42 | GCC 12.2.0 | avr-libc 2.1.0 | avrdude 7.3

            ### Archive includes
            - `bin/avr-gcc`, `bin/avr-g++`, `bin/avr-as`, `bin/avr-ld`
            - `bin/avr-ar`, `bin/avr-objcopy`, `bin/avr-objdump`, `bin/avr-nm`
            - `bin/avr-ranlib`, `bin/avr-size`, `bin/avrdude`
            - `bin/ld` (copy of avr-ld — required by GCC driver)
            - `libexec/gcc/avr/.../cc1`, `collect2`
            - `avr/lib/`, `avr/include/` (avr-libc)

            ### Architecture
            - Host ABI: aarch64-linux-android (bionic, API 24+)
            - Target: AVR (ATmega328P, ATmega2560, etc.)
          files: ${{ env.ASSET_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
