name: Build AVR Toolchain (aarch64-android NDK)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.4)'
        required: true
        default: 'v1.0.4'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      INSTALL_DIR: ${{ github.workspace }}/avr-toolchain-out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential wget xz-utils texinfo bison flex \
            libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev \
            cmake ninja-build python3 file zip \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Set cross-compiler variables
        run: |
          echo "CC=aarch64-linux-gnu-gcc"         >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++"        >> $GITHUB_ENV
          echo "AR=aarch64-linux-gnu-ar"           >> $GITHUB_ENV
          echo "RANLIB=aarch64-linux-gnu-ranlib"   >> $GITHUB_ENV
          echo "NM=aarch64-linux-gnu-nm"           >> $GITHUB_ENV
          echo "STRIP=aarch64-linux-gnu-strip"     >> $GITHUB_ENV
          echo "CFLAGS=-Os"                        >> $GITHUB_ENV
          echo "CXXFLAGS=-Os"                      >> $GITHUB_ENV
          # Static linking — no glibc/runtime dependency, runs on Android directly
          echo "LDFLAGS=-static"                   >> $GITHUB_ENV
          mkdir -p "${{ env.INSTALL_DIR }}/bin" \
                   "${{ env.INSTALL_DIR }}/lib" \
                   "${{ env.INSTALL_DIR }}/etc"

      - name: Build binutils 2.42 (target=avr, host=aarch64)
        run: |
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.xz"
          tar -xJf binutils-2.42.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.42/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-gnu \
            --build=x86_64-linux-gnu \
            --disable-nls \
            --disable-werror \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install
          echo "=== binutils done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      - name: Build GCC 12.2.0 (target=avr, host=aarch64)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz"
          tar -xJf gcc-12.2.0.tar.xz
          cd gcc-12.2.0 && contrib/download_prerequisites && cd ..
          mkdir build-gcc && cd build-gcc
          export PATH="${{ env.INSTALL_DIR }}/bin:$PATH"
          ../gcc-12.2.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-gnu \
            --build=x86_64-linux-gnu \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-shared \
            --enable-static \
            --with-dwarf2 \
            --disable-install-libiberty \
            --disable-gcov \
            --disable-lto \
            --disable-plugin \
            --with-gnu-as \
            --with-gnu-ld \
            CFLAGS_FOR_TARGET="-Os"
          make -j$(nproc) all-gcc
          make install-gcc
          echo "=== gcc done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      - name: Build avr-libc 2.1.0
        run: |
          wget -q "https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2"
          tar -xjf avr-libc-2.1.0.tar.bz2
          mkdir build-avr-libc && cd build-avr-libc
          export PATH="${{ env.INSTALL_DIR }}/bin:$PATH"
          ../avr-libc-2.1.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --host=avr \
            --build=x86_64-linux-gnu
          make -j$(nproc)
          make install
          echo "=== avr-libc done ==="

      - name: Build avrdude 7.3 (host=aarch64, static)
        run: |
          wget -q "https://github.com/avrdudes/avrdude/releases/download/v7.3/avrdude-7.3.tar.gz"
          tar -xzf avrdude-7.3.tar.gz
          mkdir build-avrdude && cd build-avrdude
          cmake ../avrdude-7.3 \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DHAVE_LIBUSB=OFF \
            -DHAVE_LIBFTDI=OFF \
            -DHAVE_LIBHIDAPI=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make -j$(nproc)
          make install
          # Copy avrdude.conf if present
          find . -name "avrdude.conf" -exec cp -v {} "${{ env.INSTALL_DIR }}/etc/" \; || true
          echo "=== avrdude done ==="

      - name: Strip binaries
        run: |
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            if file "$f" | grep -q "ELF.*aarch64"; then
              aarch64-linux-gnu-strip "$f" 2>/dev/null || true
              echo "Stripped: $f"
            fi
          done

      - name: Verify all binaries are aarch64
        run: |
          echo "=== Architecture verification ==="
          BAD=0
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            info=$(file "$f")
            echo "$(basename $f): $info"
            if echo "$info" | grep -q "ELF" && ! echo "$info" | grep -q "aarch64"; then
              echo "❌ WRONG ARCH: $f"
              BAD=1
            fi
          done
          [ "$BAD" = "0" ] || { echo "ERROR: Wrong arch binaries found"; exit 1; }
          echo "✅ All ELF binaries are aarch64"

      - name: Write manifest.json
        run: |
          cat > "${{ env.INSTALL_DIR }}/manifest.json" << EOF
          {
            "name": "avr-toolchain",
            "arch": "aarch64",
            "version": "${{ github.event.inputs.release_version }}",
            "components": {
              "binutils": "2.42",
              "gcc": "12.2.0",
              "avr-libc": "2.1.0",
              "avrdude": "7.3"
            },
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Package as zip
        run: |
          ASSET_NAME="avr-toolchain-android-aarch64.zip"
          cd "${{ env.INSTALL_DIR }}"
          zip -r "${{ github.workspace }}/${ASSET_NAME}" .
          ls -lh "${{ github.workspace }}/${ASSET_NAME}"
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Delete existing release if present
        run: gh release delete "${{ github.event.inputs.release_version }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: "AVR Toolchain ${{ github.event.inputs.release_version }} (aarch64-android)"
          body: |
            ## AVR Toolchain for Android AArch64

            Statically linked — no runtime library dependencies. Runs on Android ARM64 directly.

            ### Components
            - binutils 2.42
            - GCC 12.2.0 (avr-gcc, avr-g++)
            - avr-libc 2.1.0
            - avrdude 7.3
          files: ${{ env.ASSET_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
