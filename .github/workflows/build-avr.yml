name: Build AVR Toolchain (aarch64-android NDK)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.16)'
        required: true
        default: 'v1.0.16'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NDK_VER:     r26d
      API_LEVEL:   28
      INSTALL_DIR: ${{ github.workspace }}/avr-toolchain-out
      DEPS_DIR:    ${{ github.workspace }}/ndk-static-deps
      NATIVE_DIR:  ${{ github.workspace }}/avr-gcc-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential wget xz-utils texinfo bison flex \
            cmake ninja-build python3 file zip \
            binutils-aarch64-linux-gnu \
            gcc-avr \
            libgmp-dev libmpfr-dev libmpc-dev

      - name: Download and configure Android NDK r26d
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
          unzip -q "android-ndk-${NDK_VER}-linux.zip"

          NDK="${{ github.workspace }}/android-ndk-${NDK_VER}"
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          # Symlink GNU ld.bfd into NDK bin — avoids lld strict alignment errors
          ln -sf /usr/bin/aarch64-linux-gnu-ld "$TC/bin/ld.bfd"
          echo "ld.bfd -> $(readlink -f $TC/bin/ld.bfd)"

          # API 28 is the minimum that has posix_spawn + glob in bionic.
          # Using API_LEVEL=28 means configure finds them, compiles them in,
          # linker succeeds — no source patches or cache files needed.
          echo "CC=$TC/bin/aarch64-linux-android${API_LEVEL}-clang"    >> $GITHUB_ENV
          echo "CXX=$TC/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TC/bin/llvm-ar"                                     >> $GITHUB_ENV
          echo "RANLIB=$TC/bin/llvm-ranlib"                             >> $GITHUB_ENV
          echo "NM=$TC/bin/llvm-nm"                                     >> $GITHUB_ENV
          echo "STRIP=$TC/bin/llvm-strip"                               >> $GITHUB_ENV
          echo "NDK_TC=$TC"                                             >> $GITHUB_ENV
          # -fuse-ld=bfd : use GNU ld.bfd, avoids lld strict AArch64 alignment
          # -static       : use bionic static CRT → no dynbss alignment issue,
          #                 no SIGSYS (bionic syscalls are on Android whitelist)
          echo "LDFLAGS=-fuse-ld=bfd -static"                          >> $GITHUB_ENV
          echo "CFLAGS=-Os"                                             >> $GITHUB_ENV
          echo "CXXFLAGS=-Os"                                           >> $GITHUB_ENV

          mkdir -p "${{ env.INSTALL_DIR }}/bin" \
                   "${{ env.INSTALL_DIR }}/etc" \
                   "${{ env.DEPS_DIR }}"

      - name: Build GMP 6.3.0 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz"
          tar -xJf gmp-6.3.0.tar.xz
          # bionic has no nl_langinfo — hardcode C-locale decimal point
          sed -i 's|nl_langinfo (RADIXCHAR)|"."|g' gmp-6.3.0/gmp-impl.h
          mkdir build-gmp && cd build-gmp
          ../gmp-6.3.0/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build MPFR 4.2.1 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.1.tar.xz"
          tar -xJf mpfr-4.2.1.tar.xz
          mkdir build-mpfr && cd build-mpfr
          ../mpfr-4.2.1/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            --with-gmp="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build MPC 1.3.1 (static, NDK/bionic)
        run: |
          wget -q "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
          tar -xzf mpc-1.3.1.tar.gz
          mkdir build-mpc && cd build-mpc
          ../mpc-1.3.1/configure \
            --prefix="${{ env.DEPS_DIR }}" \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-static --disable-shared \
            --with-gmp="${{ env.DEPS_DIR }}" \
            --with-mpfr="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os"
          make -j$(nproc) && make install

      - name: Build binutils 2.42 (target=avr, host=aarch64-android)
        run: |
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.xz"
          tar -xJf binutils-2.42.tar.xz
          mkdir build-binutils && cd build-binutils

          # No source patches or cache files needed — API 28 has posix_spawn + glob
          ../binutils-2.42/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --disable-nls \
            --disable-werror \
            --disable-shared \
            --enable-static \
            CFLAGS="-Os" \
            LDFLAGS="-fuse-ld=bfd -static"

          make -j$(nproc) 2>&1 | tee /tmp/binutils_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -100 /tmp/binutils_build.log; exit 1
          fi
          make install

          for b in avr-as avr-ld avr-ar avr-ranlib avr-objcopy avr-objdump avr-nm avr-size; do
            [ -f "${{ env.INSTALL_DIR }}/bin/$b" ] \
              && echo "✅ $b" || { echo "❌ MISSING: $b"; exit 1; }
          done
          echo "=== binutils done ==="

      - name: Build GCC 12.2.0 (target=avr, host=aarch64-android)
        run: |
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz"
          tar -xJf gcc-12.2.0.tar.xz

          # Patch: remove *_unlocked stdio macros — bionic C99 mode doesn't expose them
          find gcc-12.2.0 -name "system.h" | xargs sed -i \
            -e '/fputc_unlocked/d'   \
            -e '/fputs_unlocked/d'   \
            -e '/fwrite_unlocked/d'  \
            -e '/getc_unlocked/d'    \
            -e '/getchar_unlocked/d' \
            -e '/putc_unlocked/d'    \
            -e '/putchar_unlocked/d'
          find gcc-12.2.0 -name "system.h" | xargs grep -l "unlocked" 2>/dev/null \
            && echo "WARNING: unlocked refs remain" || echo "system.h clean"

          mkdir build-gcc && cd build-gcc
          # Do NOT add INSTALL_DIR/bin to PATH — those are aarch64 Android binaries
          # that cannot execute on this x86_64 runner. configure needs x86_64 avr-as/ld.

          ../gcc-12.2.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --target=avr \
            --host=aarch64-linux-android \
            --build=x86_64-linux-gnu \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-shared \
            --enable-static \
            --with-dwarf2 \
            --disable-install-libiberty \
            --disable-gcov \
            --disable-lto \
            --disable-plugin \
            --without-zstd \
            --with-gnu-as \
            --with-gnu-ld \
            --with-gmp="${{ env.DEPS_DIR }}" \
            --with-mpfr="${{ env.DEPS_DIR }}" \
            --with-mpc="${{ env.DEPS_DIR }}" \
            CFLAGS="-Os -Wno-implicit-function-declaration" \
            CXXFLAGS="-Os" \
            LDFLAGS="-fuse-ld=bfd -static" \
            CFLAGS_FOR_TARGET="-Os"

          make -j$(nproc) all-gcc 2>&1 | tee /tmp/gcc_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            tail -150 /tmp/gcc_build.log
            grep -E "^.*error:" /tmp/gcc_build.log | head -40
            exit 1
          fi
          make install-gcc
          echo "=== GCC done ==="
          ls "${{ env.INSTALL_DIR }}/bin/"

      # Canadian Cross limitation: all-target-libgcc needs to EXECUTE avr-gcc,
      # but our avr-gcc is an Android ELF that can't run on the x86_64 runner.
      # Solution: build a native x86_64 avr-gcc, use it to produce libgcc.a,
      # then copy it into the Android-hosted install tree.
      # libgcc.a is pure AVR object code — same regardless of which host built it.
      - name: Build native avr-gcc 12.2.0 (x86_64) for libgcc only
        run: |
          unset CC CXX AR RANLIB NM STRIP LDFLAGS CFLAGS CXXFLAGS
          mkdir -p "${{ env.NATIVE_DIR }}"
          mkdir build-gcc-native && cd build-gcc-native

          ../gcc-12.2.0/configure \
            --prefix="${{ env.NATIVE_DIR }}" \
            --target=avr \
            --host=x86_64-linux-gnu \
            --build=x86_64-linux-gnu \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-shared \
            --enable-static \
            --disable-werror \
            --with-dwarf2 \
            --disable-install-libiberty \
            --disable-gcov \
            --disable-lto \
            --disable-plugin \
            --without-zstd \
            --with-gnu-as \
            --with-gnu-ld \
            CFLAGS="-O2" \
            CXXFLAGS="-O2" \
            CFLAGS_FOR_TARGET="-Os"

          make -j$(nproc) all-gcc 2>&1 | tee /tmp/gcc_native_build.log
          [ ${PIPESTATUS[0]} -eq 0 ] || { tail -100 /tmp/gcc_native_build.log; exit 1; }

          make -j$(nproc) all-target-libgcc 2>&1 | tee /tmp/gcc_native_libgcc.log
          [ ${PIPESTATUS[0]} -eq 0 ] || { tail -100 /tmp/gcc_native_libgcc.log; exit 1; }

          make install-target-libgcc
          echo "=== native libgcc done ==="
          find "${{ env.NATIVE_DIR }}" -name "libgcc.a"

      - name: Merge libgcc.a into android-hosted toolchain
        run: |
          mkdir -p "${{ env.INSTALL_DIR }}/lib/gcc/avr/12.2.0"
          cp -a "${{ env.NATIVE_DIR }}/lib/gcc/avr/12.2.0/." \
                "${{ env.INSTALL_DIR }}/lib/gcc/avr/12.2.0/"
          FOUND=$(find "${{ env.INSTALL_DIR }}" -name "libgcc.a" | head -1)
          [ -n "$FOUND" ] && echo "✅ libgcc.a: $FOUND" || { echo "❌ libgcc.a missing"; exit 1; }

      - name: Build avr-libc 2.1.0
        run: |
          wget -q "https://download.savannah.gnu.org/releases/avr-libc/avr-libc-2.1.0.tar.bz2"
          tar -xjf avr-libc-2.1.0.tar.bz2
          mkdir build-avr-libc && cd build-avr-libc
          # Compile FOR avr using system x86_64 avr-gcc.
          # Explicit CC/AR/RANLIB/STRIP prevent NDK env vars from leaking in.
          ../avr-libc-2.1.0/configure \
            --prefix="${{ env.INSTALL_DIR }}" \
            --host=avr \
            --build=x86_64-linux-gnu \
            CC=/usr/bin/avr-gcc \
            AR=/usr/bin/avr-ar \
            RANLIB=/usr/bin/avr-ranlib \
            STRIP=/usr/bin/avr-strip
          make -j$(nproc) && make install
          echo "=== avr-libc done ==="

      - name: Build avrdude 7.3 (host=aarch64-android)
        run: |
          wget -v "https://github.com/avrdudes/avrdude/archive/refs/tags/v7.3.tar.gz" \
               -O avrdude-7.3.tar.gz
          tar -xzf avrdude-7.3.tar.gz
          AVRDUDE_SRC=$(ls -d avrdude-*/ | head -1)
          echo "Source: $AVRDUDE_SRC"
          mkdir build-avrdude && cd build-avrdude
          cmake "../$AVRDUDE_SRC" \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" \
            -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=${{ env.API_LEVEL }} \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="${{ github.workspace }}/android-ndk-${{ env.NDK_VER }}" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=bfd -static" \
            -DUSE_LIBUSB_1_0=OFF \
            -DUSE_LIBFTDI1=OFF \
            -DUSE_LIBHIDAPI=OFF \
            -DUSE_LIBELF=OFF \
            -DUSE_LINUXGPIO=OFF \
            -DUSE_LINUXSPI=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make -j$(nproc) && make install
          find . -name "avrdude.conf" \
            -exec cp -v {} "${{ env.INSTALL_DIR }}/etc/" \; 2>/dev/null || true
          echo "=== avrdude done ==="

      - name: Create bare-name tool copies (ld, as, ar, etc.)
        run: |
          # GCC's collect2 searches -B dirs for bare names: 'ld','as' not 'avr-ld','avr-as'
          # cp (not symlink) — avoids symlink resolution issues on Android
          BIN="${{ env.INSTALL_DIR }}/bin"
          declare -A TOOLS=(
            [ld]=avr-ld   [as]=avr-as       [ar]=avr-ar
            [ranlib]=avr-ranlib [nm]=avr-nm  [objcopy]=avr-objcopy
            [objdump]=avr-objdump [size]=avr-size [strip]=avr-strip
          )
          for bare in "${!TOOLS[@]}"; do
            prefixed="${TOOLS[$bare]}"
            if [ -f "$BIN/$prefixed" ]; then
              cp "$BIN/$prefixed" "$BIN/$bare"
              echo "✅ $bare ← $prefixed"
            else
              echo "❌ MISSING: $BIN/$prefixed"; exit 1
            fi
          done
          echo "=== bare-name tools done ==="

      # GNU ld.bfd sets PT_TLS p_align=8; Android Bionic requires >=64.
      # Patch the p_align field directly in every ELF binary's program header.
      - name: Fix TLS segment alignment for Android Bionic
        run: |
          python3 << 'PYEOF'
          import struct, os

          def fix_tls_alignment(path):
              try:
                  with open(path, 'rb') as f:
                      data = bytearray(f.read())
              except Exception:
                  return
              if data[:4] != b'\x7fELF' or data[4] != 2 or data[5] != 1:
                  return
              e_phoff     = struct.unpack_from('<Q', data, 32)[0]
              e_phentsize = struct.unpack_from('<H', data, 54)[0]
              e_phnum     = struct.unpack_from('<H', data, 56)[0]
              PT_TLS = 7
              changed = False
              for i in range(e_phnum):
                  off = e_phoff + i * e_phentsize
                  p_type = struct.unpack_from('<I', data, off)[0]
                  if p_type == PT_TLS:
                      align_off = off + 48
                      p_align = struct.unpack_from('<Q', data, align_off)[0]
                      if p_align < 64:
                          print(f"  {os.path.basename(path)}: PT_TLS p_align {p_align} → 64")
                          struct.pack_into('<Q', data, align_off, 64)
                          changed = True
              if changed:
                  with open(path, 'wb') as f:
                      f.write(bytes(data))

          install_dir = os.environ['INSTALL_DIR']
          for root, dirs, files in os.walk(install_dir):
              for fname in files:
                  fpath = os.path.join(root, fname)
                  if not os.path.islink(fpath):
                      fix_tls_alignment(fpath)
          print("TLS alignment fix complete")
          PYEOF

      - name: Strip and verify binaries
        run: |
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            if file "$f" | grep -q "ELF.*aarch64"; then
              "${{ env.STRIP }}" "$f" 2>/dev/null && echo "stripped: $(basename $f)" || true
            fi
          done
          echo "=== verify arch ==="
          BAD=0
          for f in "${{ env.INSTALL_DIR }}/bin"/*; do
            info=$(file "$f")
            echo "  $(basename $f): $info"
            if echo "$info" | grep -q "ELF" && ! echo "$info" | grep -q "aarch64"; then
              echo "❌ WRONG ARCH: $f"; BAD=1
            fi
          done
          [ "$BAD" = "0" ] || { echo "Wrong arch found"; exit 1; }
          echo "✅ All aarch64"

      - name: Verify all required binaries are present
        run: |
          REQUIRED=(
            avr-gcc avr-g++ avr-as avr-ld avr-ar
            avr-objcopy avr-objdump avr-nm avr-ranlib avr-size
            ld as ar ranlib nm objcopy objdump size strip
            cc1 cc1plus collect2
          )
          MISSING=0
          for bin in "${REQUIRED[@]}"; do
            found=$(find "${{ env.INSTALL_DIR }}/bin" \
                         "${{ env.INSTALL_DIR }}/libexec" \
                    -name "$bin" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "  ✅ $bin → $found"
            else
              echo "  ❌ MISSING: $bin"; MISSING=1
            fi
          done
          echo "=== libgcc check ==="
          LIBGCC=$(find "${{ env.INSTALL_DIR }}/lib/gcc/avr" -name "libgcc.a" 2>/dev/null | head -1)
          if [ -z "$LIBGCC" ]; then
            echo "  ❌ MISSING: libgcc.a"; MISSING=1
          else
            echo "  ✅ libgcc.a → $LIBGCC"
          fi
          [ "$MISSING" = "1" ] && { echo "Missing required binaries"; exit 1; }
          echo "✅ All required binaries present"

      - name: Write manifest.json
        run: |
          cat > "${{ env.INSTALL_DIR }}/manifest.json" << EOF
          {
            "name": "avr-toolchain",
            "arch": "aarch64",
            "abi": "aarch64-linux-android",
            "api_level": ${{ env.API_LEVEL }},
            "version": "${{ github.event.inputs.release_version }}",
            "components": {
              "binutils": "2.42",
              "gcc": "12.2.0",
              "avr-libc": "2.1.0",
              "avrdude": "7.3"
            },
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Package as zip
        run: |
          ASSET="avr-toolchain-android-aarch64.zip"
          cd "${{ env.INSTALL_DIR }}"
          zip -r "${{ github.workspace }}/$ASSET" .
          ls -lh "${{ github.workspace }}/$ASSET"
          echo "ASSET_NAME=$ASSET" >> $GITHUB_ENV

      - name: Delete existing release
        run: gh release delete "${{ github.event.inputs.release_version }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: "AVR Toolchain ${{ github.event.inputs.release_version }} (aarch64-android)"
          body: |
            ## AVR Toolchain for Android AArch64

            Built with Android NDK r26d (API 28).
            Statically linked against bionic — no SIGSYS, no TLS underalignment.

            ### Components
            - binutils 2.42 | GCC 12.2.0 | avr-libc 2.1.0 | avrdude 7.3

            ### Archive includes
            - `bin/avr-gcc`, `bin/avr-as`, `bin/avr-ld`, `bin/avr-ar`, `bin/avr-objcopy`
            - `bin/ld`, `bin/as`, `bin/ar` etc. (bare-name copies for GCC internal use)
            - `libexec/gcc/avr/12.2.0/cc1`, `cc1plus`, `collect2`
            - `lib/gcc/avr/12.2.0/libgcc.a`
            - `avr/lib/`, `avr/include/` (avr-libc)
            - `etc/avrdude.conf`

            ### Architecture
            - Host ABI: aarch64-linux-android (bionic, API 28+)
            - Target: AVR (ATmega328P, ATmega2560, etc.)
          files: ${{ env.ASSET_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
